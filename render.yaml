services:
  - type: web
    name: radheshyam
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gevent --workers 1 main:app
    envVars:
      - key: PORT
        value: 10000
      # Add these later for SmartAPI MCX:
      # - key: SMARTAPI_KEY
      #   value: your_key
      # - key: CLIENT_CODE
      #   value: your_code
