<!DOCTYPE html>
<html>
<head><title>GOAT PRO DASHBOARD</title></head>
<body>
<script>
async function tickNifty() {
    try {
        let res = await fetch('/api/data');
        let data = await res.json();
        document.getElementById('hero-price').innerText = data.price.toLocaleString('en-IN');
    } catch(e) { console.log("Updating..."); }
}
setInterval(tickNifty, 5000);
</script>
</body>
</html>
