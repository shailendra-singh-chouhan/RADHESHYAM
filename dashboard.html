<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAT PRO DASHBOARD</title>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
        }

        #hero-price {
            font-size: 42px;
            font-weight: bold;
            color: #22c55e;
        }

        .status {
            margin-top: 15px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>GOAT PRO DASHBOARD</h1>

    <div id="hero-price">Loading...</div>

    <div class="status">
        Live NIFTY Data
    </div>
</div>

<script>
async function tickNifty() {
    try {
        const res = await fetch('/api/data');
        const data = await res.json();

        document.getElementById('hero-price').innerText =
            Number(data.price).toLocaleString('en-IN');

    } catch (e) {
        document.getElementById('hero-price').innerText = 'Error';
        console.log(e);
    }
}

tickNifty();
setInterval(tickNifty, 5000);
</script>

</body>
</html>
